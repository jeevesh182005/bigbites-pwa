<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ff6a00" />
    <title>Big Bites Offline</title>
    <style>
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
        color: white;
        font-family: Inter, system-ui, sans-serif;
      }
      .card {
        width: min(88vw, 420px);
        padding: 32px;
        border: 1px solid rgba(255, 106, 0, .25);
        border-radius: 28px;
        background: rgba(255,255,255,.07);
        box-shadow: 0 0 52px rgba(255,106,0,.2);
        text-align: center;
      }
      .mark { font-size: 52px; }
      h1 { margin: 14px 0 8px; }
      p { color: #d4d4d4; line-height: 1.6; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="mark">🍽️</div>
      <h1>Big Bites is offline-ready</h1>
      <p>Your menu and key pages are cached. Reconnect to place orders through WhatsApp.</p>
    </main>
  </body>
</html>
